<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RITMO" />
    <meta name="theme-color" id="theme-color-meta" content="#000000" />
    <meta name="format-detection" content="telephone=no" />
    <!--
      Content-Security-Policy — Defense-in-depth gegen XSS. GitHub
      Pages erlaubt keine HTTP-Header, deshalb als <meta>. Wichtige
      Hosts:
        - Supabase REST + Realtime (HTTPS + WebSocket)
        - api.qrserver.com für QR-Code-Generierung im Online-Turnier
        - images.pexels.com / images.unsplash.com / videos.pexels.com
          → Ambient-Assets für das "Bauhaus Funky"-Theme (Stock-Bilder
          und -Videos). Andere Themes laden NICHTS extern.
        - data: + blob: für Image-Previews + Worker-Bundles
      'unsafe-inline' bei style-src ist nötig, weil React Inline-Styles
      benutzt. 'unsafe-eval' wird bewusst NICHT erlaubt.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: blob: https://api.qrserver.com https://images.pexels.com https://images.unsplash.com;
               media-src 'self' blob: https://videos.pexels.com https://*.pexels.com;
               font-src 'self' data:;
               connect-src 'self' https://*.supabase.co wss://*.supabase.co https://videos.pexels.com https://*.pexels.com;
               worker-src 'self' blob:;
               object-src 'none';
               base-uri 'self';
               frame-ancestors 'none';
               form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <!-- __BASE_INJECTION__ -->
    <title>RITMO Padel</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        width: 100%;
        background: #000;
        overscroll-behavior: none;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        height: 100%;
        height: 100dvh;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
