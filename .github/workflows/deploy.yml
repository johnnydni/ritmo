name: Deploy RITMO Padel to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Custom domain support:
#   Set a repository variable named CUSTOM_DOMAIN (Settings → Secrets and
#   variables → Actions → Variables) to e.g. "ritmopadel.app" — the build
#   then serves from "/" instead of "/<repo>/" and a dist/CNAME file is
#   written so GitHub Pages keeps the binding on every deploy.
#
#   Leave CUSTOM_DOMAIN unset and the workflow falls back to the original
#   project-page layout at https://<user>.github.io/<repo>/.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Compute base path
        id: base
        run: |
          if [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "Using custom domain: ${{ vars.CUSTOM_DOMAIN }} (base = /)"
          else
            echo "path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "No CUSTOM_DOMAIN set, using project page base /${{ github.event.repository.name }}/"
          fi

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Write CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: |
          # GitHub Pages reads dist/CNAME on every deploy to maintain the
          # custom-domain binding. Without this the binding can drop after
          # a deploy and Pages reverts to the *.github.io URL.
          printf "%s\n" "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME
          echo "Wrote dist/CNAME:"
          cat dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
